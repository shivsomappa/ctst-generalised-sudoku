- name: Store history
  run: |
    mkdir -p data

    DATE=$(date +'%Y-%m-%d')

    VIEWS=$(jq '.count // 0' views.json)
    UNIQUE_VIEWS=$(jq '.uniques // 0' views.json)

    CLONES=$(jq '.count // 0' clones.json)
    UNIQUE_CLONES=$(jq '.uniques // 0' clones.json)

    # Always append a row
    echo "$DATE,$VIEWS,$UNIQUE_VIEWS,$CLONES,$UNIQUE_CLONES" >> data/traffic_history.csv

    # Show file content for debug
    cat data/traffic_history.csv

- name: Commit changes
  run: |
    git config --global user.name "github-actions"
    git config --global user.email "actions@github.com"

    git add data/traffic_history.csv

    # Force commit even if Git thinks nothing changed
    git commit -m "Update traffic history" || echo "No changes to commit"

    git push
