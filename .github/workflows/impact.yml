name: Fetch Traffic History

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'   # runs daily at midnight UTC

jobs:
  fetch-traffic:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch views data
        env:
          GH_TOKEN: ${{ secrets.TRAFFIC_TOKEN }}
        run: |
          curl -f -H "Authorization: token $GH_TOKEN" \
               -H "Accept: application/vnd.github+json" \
               https://api.github.com/repos/${{ github.repository }}/traffic/views \
               -o traffic_raw.json
          echo "--- RAW VIEWS RESPONSE ---"
          cat traffic_raw.json

      - name: Fetch clones data
        env:
          GH_TOKEN: ${{ secrets.TRAFFIC_TOKEN }}
        run: |
          curl -f -H "Authorization: token $GH_TOKEN" \
               -H "Accept: application/vnd.github+json" \
               https://api.github.com/repos/${{ github.repository }}/traffic/clones \
               -o clones_raw.json
          echo "--- RAW CLONES RESPONSE ---"
          cat clones_raw.json

      - name: Convert to CSV
        run: |
          mkdir -p data
          echo "date,views,unique_views,clones,unique_clones" > data/traffic_history.csv

          # Merge daily records by date
          jq -s '
            def to_map(stream; key): stream | map({(.[key]): .}) | add;
            (.[0].views | map({date: .timestamp, views: .count, unique_views: .uniques}))
            as $views
            | (.[1].clones | map({date: .timestamp, clones: .count, unique_clones: .uniques}))
            as $clones
            | ($views | to_map("date")) as $vmap
            | ($clones | to_map("date")) as $cmap
            | ($vmap + $cmap)
            | to_entries
            | sort_by(.key)
            | map([.key, (.value.views // ""), (.value.unique_views // ""), (.value.clones // ""), (.value.unique_clones // "")])
            | .[]
            | @csv
          ' traffic_raw.json clones_raw.json >> data/traffic_history.csv

          # Add a summary row with totals
          views_total=$(jq '.count' traffic_raw.json)
          views_uniques=$(jq '.uniques' traffic_raw.json)
          clones_total=$(jq '.count' clones_raw.json)
          clones_uniques=$(jq '.uniques' clones_raw.json)
          echo "TOTAL,$views_total,$views_uniques,$clones_total,$clones_uniques" >> data/traffic_history.csv

          cat data/traffic_history.csv

      - name: Commit CSV to repo
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/traffic_history.csv
          git commit -m "Update traffic history" || echo "No changes to commit"
          git push
