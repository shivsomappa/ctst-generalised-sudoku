name: Test Write File

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  write:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - run: |
          mkdir -p data
          echo "date,views,unique_views,clones,unique_clones" > data/traffic_history.csv
          echo "2026-04-24,5,5,5,5" >> data/traffic_history.csv

      - run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/traffic_history.csv
          git commit -m "test write" || echo "no changes"
          git push
