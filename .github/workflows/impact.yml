 name: Convert to CSV
  run: |
    mkdir -p data
    echo "date,views,unique_views,clones,unique_clones" > data/traffic_history.csv

    # Build a combined JSON keyed by date
    jq -s '
      {
        views: (.[0].views | map({date: .timestamp, views: .count, unique_views: .uniques})),
        clones: (.[1].clones | map({date: .timestamp, clones: .count, unique_clones: .uniques}))
      }
      | .views
      | map(
          . + (
            (.date as $d | (.. | objects | select(.date==$d))) // {}
          )
        )
    ' traffic_raw.json clones_raw.json \
    | jq -r '.[] | [.date, .views, .unique_views, (.clones // ""), (.unique_clones // "")] | @csv' \
    >> data/traffic_history.csv

    cat data/traffic_history.csv
