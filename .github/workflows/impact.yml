name: Fetch Traffic History

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'   # runs daily at midnight UTC

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fetch-traffic:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch traffic data
        env:
          GH_TOKEN: ${{ secrets.TRAFFIC_TOKEN }}
        run: |
          curl -f -H "Authorization: token $GH_TOKEN" \
               -H "Accept: application/vnd.github+json" \
               https://api.github.com/repos/${{ github.repository }}/traffic/views \
               -o traffic_raw.json
          echo "--- RAW API RESPONSE ---"
          cat traffic_raw.json

      - name: Debug API response
        env:
          GH_TOKEN: ${{ secrets.TRAFFIC_TOKEN }}
        run: |
          echo "Response headers:"
          curl -I -H "Authorization: token $GH_TOKEN" \
               -H "Accept: application/vnd.github+json" \
               https://api.github.com/repos/${{ github.repository }}/traffic/views

      - name: Convert to CSV
        run: |
          mkdir -p data
          echo "date,views,unique_visitors" > data/traffic_history.csv
          if jq -e '.views | length > 0' traffic_raw.json > /dev/null; then
            jq -r '.views[] | [.timestamp, .count, .uniques] | @csv' \
               traffic_raw.json >> data/traffic_history.csv
          else
            echo "No traffic data returned from API"
          fi
          cat data/traffic_history.csv

      - name: Commit CSV to repo
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/traffic_history.csv
          git commit -m "Update traffic history" || echo "No changes to commit"
          git push
